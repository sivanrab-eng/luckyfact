  <text x="138" y="318" fill="#ffffff" font-size="34" font-family="Arial, sans-serif" font-weight="700">שלב 6 מתוך 10</text>
  <text x="940" y="318" text-anchor="end" fill="#ffffff" font-size="34" font-family="Arial, sans-serif" font-weight="700">9/15</text>
  <rect x="138" y="338" width="806" height="34" rx="17" fill="#12205f"/>
  <rect x="138" y="338" width="482" height="34" rx="17" fill="#67f47d"/>

