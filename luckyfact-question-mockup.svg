  <rect x="94" y="1388" width="892" height="250" rx="40" fill="#19297b" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
  <text x="140" y="1438" fill="#ffffff" font-size="38" font-family="Arial, sans-serif" font-weight="700">בילבורד חי</text>
  <text x="942" y="1438" text-anchor="end" fill="#ffe25c" font-size="38" font-family="Arial, sans-serif" font-weight="700">#8</text>
  <g font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
    <circle cx="152" cy="1497" r="14" fill="#ff5a79"/><text x="192" y="1505">נועה</text><text x="940" y="1505" text-anchor="end">16,980</text>
    <circle cx="152" cy="1534" r="14" fill="#4ec1ff"/><text x="192" y="1542">דני</text><text x="940" y="1542" text-anchor="end">16,420</text>
    <rect x="132" y="1556" width="806" height="44" rx="18" fill="rgba(255,255,255,0.12)"/>
    <circle cx="152" cy="1579" r="14" fill="#62f480"/><text x="192" y="1587">את/ה</text><text x="940" y="1587" text-anchor="end">15,760</text>
