  <ellipse cx="542" cy="705" rx="275" ry="275" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.8"/>
  <ellipse cx="542" cy="705" rx="288" ry="288" fill="none" stroke="#54ffff" stroke-width="10" opacity="0.45" filter="url(#soft)"/>
  <text x="542" y="635" text-anchor="middle" fill="#ffffff" font-size="72" font-family="Arial, sans-serif" font-weight="900">שאלה 9</text>
