<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b67ff"/>
      <stop offset="54%" stop-color="#4169ff"/>
      <stop offset="100%" stop-color="#d878ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="33%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.48"/>
      <stop offset="52%" stop-color="#7efcff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7efcff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2e35d0"/><stop offset="100%" stop-color="#1c247f"/></linearGradient>
    <linearGradient id="btnBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2e91ff"/><stop offset="100%" stop-color="#1560ff"/></linearGradient>
    <linearGradient id="btnPink" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff7ea8"/><stop offset="100%" stop-color="#ff386a"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e9efff"/></linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
