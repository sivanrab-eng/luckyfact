  <text x="540" y="1018" text-anchor="middle" fill="#182845" font-size="48" font-family="Arial, sans-serif" font-weight="700">האם פינגווין יכול לעוף?</text>
  <text x="540" y="1078" text-anchor="middle" fill="#5b6f95" font-size="30" font-family="Arial, sans-serif">בחר אמת או שקר</text>

