    <g transform="translate(382 110)"><rect width="300" height="120" rx="34" fill="#b14fff"/><circle cx="46" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="96" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="146" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="196" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="246" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="46" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="96" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="146" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="196" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="246" cy="78" r="18" fill="#edd2ff" opacity="0.3"/></g>
    <g transform="translate(816 240) rotate(16)"><rect width="198" height="110" rx="30" fill="#49f2ff"/><circle cx="36" cy="26" r="16" fill="#d6ffff" opacity="0.35"/><circle cx="80" cy="26" r="16" fill="#d6ffff" opacity="0.35"/><circle cx="124" cy="26" r="16" fill="#d6ffff" opacity="0.35"/><circle cx="36" cy="68" r="16" fill="#d6ffff" opacity="0.35"/><circle cx="80" cy="68" r="16" fill="#d6ffff" opacity="0.35"/><circle cx="124" cy="68" r="16" fill="#d6ffff" opacity="0.35"/></g>
    <g transform="translate(782 610) rotate(-8)"><rect width="230" height="106" rx="30" fill="#62ff1b"/><circle cx="40" cy="26" r="15" fill="#eaffd8" opacity="0.35"/><circle cx="90" cy="26" r="15" fill="#eaffd8" opacity="0.35"/><circle cx="140" cy="26" r="15" fill="#eaffd8" opacity="0.35"/><circle cx="40" cy="66" r="15" fill="#eaffd8" opacity="0.35"/><circle cx="90" cy="66" r="15" fill="#eaffd8" opacity="0.35"/><circle cx="140" cy="66" r="15" fill="#eaffd8" opacity="0.35"/></g>
