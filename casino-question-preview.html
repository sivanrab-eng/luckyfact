<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Fact Casino Preview</title>
  <style>
    :root {
      --bg-top: #0a1628;
      --bg-bottom: #030b18;
      --cyan: #44b7ff;
      --cyan-soft: #86d8ff;
      --cyan-glow: rgba(58, 138, 255, 0.55);
      --purple: #8833ff;
      --purple-glow: rgba(136, 51, 255, 0.45);
      --gold-a: #f5d060;
      --gold-b: #c8940a;
      --gold-c: #7b5600;
      --silver-a: #d8dde5;
      --silver-b: #9099a8;
      --silver-c: #4b5361;
      --fire-a: #ffcf63;
      --fire-b: #ff7a00;
      --fire-c: #b92d00;
      --text: #f5fbff;
      --muted: rgba(216, 233, 247, 0.78);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(24, 58, 112, 0.52) 0%, transparent 38%),
        radial-gradient(circle at 85% 82%, rgba(0, 136, 255, 0.12) 0%, transparent 18%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      opacity: 0.22;
      background:
        url("./assets/casino-ui/background_cyber_vault_tile.png") center/360px auto repeat,
        radial-gradient(circle at 10% 22%, rgba(0, 170, 255, 0.32) 0 2px, transparent 3px),
        radial-gradient(circle at 78% 14%, rgba(0, 170, 255, 0.28) 0 2px, transparent 3px),
        radial-gradient(circle at 22% 74%, rgba(0, 204, 255, 0.24) 0 2px, transparent 3px),
        linear-gradient(90deg, transparent 9%, rgba(0, 170, 255, 0.18) 9.2%, transparent 9.5%),
        linear-gradient(180deg, transparent 14%, rgba(0, 170, 255, 0.12) 14.2%, transparent 14.5%),
        linear-gradient(90deg, transparent 68%, rgba(0, 170, 255, 0.15) 68.2%, transparent 68.5%),
        linear-gradient(180deg, transparent 66%, rgba(0, 170, 255, 0.11) 66.2%, transparent 66.5%);
      filter: blur(0.15px);
    }

    body::after {
      opacity: 0.12;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 48px),
        repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 56px);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.58));
    }

    .screen {
      width: min(100vw, 414px);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      padding: 18px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .code-overlay {
      position: absolute;
      inset: 0;
      overflow: hidden;
      opacity: 0.14;
      pointer-events: none;
      user-select: none;
      font-family: Consolas, "Courier New", monospace;
      color: #6abfff;
      font-size: 10px;
    }

    .code-line {
      position: absolute;
      white-space: nowrap;
    }

    .panel {
      position: relative;
      border: 2px solid rgba(58, 138, 255, 0.92);
      border-radius: 16px;
      box-shadow:
        0 0 18px rgba(58, 138, 255, 0.4),
        inset 0 0 18px rgba(58, 138, 255, 0.08);
      background: linear-gradient(180deg, rgba(14, 25, 44, 0.92), rgba(8, 15, 30, 0.98));
      overflow: hidden;
    }

    .neon-card {
      background-color: #0b101e;
      border: 2px solid #00f0ff;
      border-radius: 12px;
      box-shadow: 0 0 10px #00f0ff, inset 0 0 15px rgba(0, 240, 255, 0.3);
      color: white;
    }

    .hud {
      position: relative;
      min-height: 72px;
      background: center/100% 100% no-repeat url("./assets/casino-ui/hud_top_bar.png");
    }

    .hud > * {
      display: none;
    }

    .badge {
      height: 56px;
      display: grid;
      place-items: center;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .badge-core {
      width: 58px;
      height: 58px;
      display: block;
      background: center/contain no-repeat url("./assets/casino-ui/active_badge_icon_decoder.png");
      filter: drop-shadow(0 0 12px rgba(69, 194, 255, 0.28));
    }

    .hud-coins,
    .combo {
      min-height: 54px;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .hud-coins-inner,
    .combo-inner {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .hud-coins-inner {
      gap: 10px;
      padding: 6px 6px;
    }

    .coin-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex: 0 0 auto;
      position: relative;
      background: radial-gradient(circle at 35% 35%, var(--gold-a), var(--gold-b) 68%, var(--gold-c));
      border: 2px solid #f5c842;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.38);
    }

    .coin-icon::before {
      content: "₪";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff8d0;
      font-weight: 800;
      font-size: 17px;
    }

    .coin-copy {
      display: grid;
      gap: 2px;
      text-align: right;
      direction: rtl;
    }

    .coin-copy small {
      color: #f7e3a4;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .coin-copy strong {
      color: #ffd972;
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .combo-inner {
      justify-content: center;
      padding: 6px 10px;
    }

    .combo span {
      font-size: 26px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
      background: linear-gradient(90deg, #ff44cc, #44f1ff, #7cf6ff);
      background-size: 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 24px rgba(68, 170, 255, 0.18);
      animation: shimmer 2.2s linear infinite;
    }

    .fact-card {
      padding: 0;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      background: none;
    }

    .fact-shell {
      position: relative;
      min-height: 296px;
      padding: 0;
      background: center/100% 100% no-repeat url("./assets/casino-ui/ui_frame_fact_card_outline_full.png");
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.12);
    }

    .fact-shell::before,
    .fact-shell::after,
    .fact-shell-corners,
    .fact-top-glow,
    .fact-text,
    .risk-row {
      display: none;
    }

    .bet-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .bet-title {
      margin: 0;
      color: rgba(218, 226, 235, 0.92);
      font-size: 17px;
      font-weight: 500;
      text-shadow: 0 0 10px rgba(58, 138, 255, 0.34);
    }

    .chips {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      direction: ltr;
    }

    .chip {
      width: 84px;
      height: 84px;
      border: 0;
      padding: 0;
      position: relative;
      border-radius: 50%;
      cursor: pointer;
      background: transparent;
      transition: transform 140ms ease;
    }

    .chip:active {
      transform: scale(0.95);
    }

    .chip:hover {
      transform: scale(1.05);
    }

    .chip-core {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: block;
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.42));
    }

    .chip.gold .chip-core {
      background-image: url("./assets/casino-ui/bet_chip_50.png");
    }

    .chip.bronze .chip-core {
      background-image: url("./assets/casino-ui/bet_chip_100.png");
    }

    .chip.silver .chip-core {
      background-image: url("./assets/casino-ui/bet_chip_250.png");
    }

    .chip.fire {
      width: 94px;
      height: 94px;
    }

    .chip.fire::before {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 102, 0, 0.25) 0%, transparent 70%);
      animation: flamePulse 1s infinite alternate;
    }

    .chip.fire .chip-core {
      background-image: url("./assets/casino-ui/bet_chip_all_in.png");
      background-size: cover;
      animation: pulse 1.5s infinite;
    }


    .answer-frame {
      position: relative;
      flex: 1;
      min-height: 82px;
    }

    .answer-frame .answer {
      display: block;
      width: 100%;
      min-height: 82px;
      padding: 0;
      border-radius: 0;
      background-color: transparent;
      background-position: center;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      border: 0;
      box-shadow: none;
      appearance: none;
      -webkit-appearance: none;
      text-indent: -9999px;
    }

    .answer-shell-corners::before,
    .answer-shell-corners::after {
      display: none;
    }

    .answers {
      display: flex;
      gap: 12px;
      margin-top: -2px;
      direction: ltr;
    }

    .answer {
      flex: 1;
      min-height: 80px;
      border: 0;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background-color: transparent;
      transition: transform 140ms ease;
    }

    .answer:active {
      transform: scale(0.96);
    }

    .answer::before,
    .answer::after {
      display: none;
    }

    .answer.false,
    .btn-false {
      background-image: url("./assets/casino-ui/btn_false.png");
    }

    .answer.truth,
    .btn-true {
      background-image: url("./assets/casino-ui/btn_true.png");
    }

    .spark-row {
      display: flex;
      justify-content: flex-end;
      opacity: 0.4;
    }

    .spark {
      width: 16px;
      height: 16px;
      background: radial-gradient(circle, #ffffff, transparent);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    @keyframes shimmer {
      from { background-position: 0% center; }
      to { background-position: 200% center; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.84; }
    }

    @keyframes flamePulse {
      from { transform: scale(0.95); opacity: 0.6; }
      to { transform: scale(1.1); opacity: 1; }
    }

    @media (max-width: 390px) {
      .screen {
        padding: 18px 12px 16px;
      }

      .hud {
        grid-template-columns: 60px 1fr 114px;
        gap: 8px;
      }

      .combo span {
        font-size: 24px;
      }

      .coin-copy strong {
        font-size: 20px;
      }

      .fact-text {
        font-size: 29px;
      }

      .chips {
        gap: 10px;
      }

      .chip {
        width: 76px;
        height: 76px;
      }

      .chip.fire {
        width: 86px;
        height: 86px;
      }

      .answer {
        min-height: 76px;
      }
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="code-overlay" aria-hidden="true">
      <div class="code-line" style="top: 6%; left: 8%;">const result = getData();</div>
      <div class="code-line" style="top: 14%; left: 48%;">if (score &gt; 1000) {</div>
      <div class="code-line" style="top: 22%; left: 18%;">return combo * bet;</div>
      <div class="code-line" style="top: 35%; left: 58%;">player.coins += reward;</div>
      <div class="code-line" style="top: 51%; left: 10%;">function checkAnswer(a) {</div>
      <div class="code-line" style="top: 67%; left: 42%;">setState({ active: true });</div>
      <div class="code-line" style="top: 82%; left: 22%;">coins += stake * combo;</div>
    </div>

    <section class="hud" aria-label="hud top bar"></section>

    <section class="panel fact-card">
      <div class="fact-shell" aria-label="fact card"></div>
    </section>

    <section class="bet-zone">
      <p class="bet-title">?כמה אתה מוכן להמר</p>
      <div class="chips">
        <button class="chip gold" type="button" aria-label="50">
          <span class="chip-core"></span>
        </button>
        <button class="chip bronze" type="button" aria-label="100">
          <span class="chip-core"></span>
        </button>
        <button class="chip silver" type="button" aria-label="250">
          <span class="chip-core"></span>
        </button>
        <button class="chip fire" type="button" aria-label="ALL-IN">
          <span class="chip-core"></span>
        </button>
      </div>
    </section>

    <section class="answers">
      <div class="answer-frame">
        <div class="answer-shell-corners"></div>
        <button class="answer false btn-false" type="button">שקר</button>
      </div>
      <div class="answer-frame">
        <div class="answer-shell-corners"></div>
        <button class="answer truth btn-true" type="button">אמת</button>
      </div>
    </section>

    <div class="spark-row">
      <div class="spark" aria-hidden="true"></div>
    </div>
  </main>

</body>
</html>
