<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Score Dash opening screen">
  <defs>
    <linearGradient id="bg" x1="120" y1="0" x2="960" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#061a68"/>
      <stop offset="45%" stop-color="#2248d8"/>
      <stop offset="78%" stop-color="#7d34df"/>
      <stop offset="100%" stop-color="#12cfe8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="56%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="31%" stop-color="#64f5ff" stop-opacity="0.3"/>
      <stop offset="72%" stop-color="#784cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#081451" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="48%" stop-color="#72ecff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#132275" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60f7ff"/>
      <stop offset="100%" stop-color="#20ffa7"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ff7ff"/>
      <stop offset="42%" stop-color="#2878ff"/>
      <stop offset="100%" stop-color="#173fce"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dff9ff"/>
    </linearGradient>
    <filter id="blur20" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#02104c" flood-opacity="0.46"/>
    </filter>
    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#72f8ff" flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#091559" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>
  <path d="M-90 360 C180 214 385 272 582 120 C780 -30 1068 50 1180 -80" fill="none" stroke="#66f7ff" stroke-width="24" stroke-linecap="round" opacity="0.16" filter="url(#blur20)"/>
  <path d="M-120 1608 C145 1455 382 1512 572 1374 C780 1224 984 1308 1188 1164" fill="none" stroke="#c78cff" stroke-width="22" stroke-linecap="round" opacity="0.16" filter="url(#blur20)"/>

  <g font-family="'Rubik', 'Fredoka', Arial, sans-serif" text-anchor="middle">
    <g transform="translate(540 770)">
      <ellipse cx="0" cy="354" rx="366" ry="54" fill="#03124d" opacity="0.24" filter="url(#blur20)"/>
      <circle r="342" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <circle r="304" fill="none" stroke="#7ff8ff" stroke-width="14" opacity="0.34" filter="url(#blur20)"/>
      <circle r="265" fill="url(#glass)" stroke="rgba(255,255,255,0.36)" stroke-width="3"/>
      <circle r="208" fill="none" stroke="rgba(255,255,255,0.52)" stroke-width="7" stroke-dasharray="34 22"/>
      <text y="-74" font-size="96" fill="url(#titleFill)" font-weight="1000" filter="url(#textGlow)">Score Dash</text>
      <text y="28" font-size="43" fill="#ffffff" font-weight="900">אתגר מהיר עד השלב הבא</text>
      <text y="92" font-size="30" fill="#dffbff" font-weight="800">10 שלבים · 15 שאלות בכל שלב</text>
    </g>

    <g transform="translate(146 1200)" filter="url(#shadow)">
      <rect width="788" height="124" rx="62" fill="rgba(7,18,77,0.58)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <text x="394" y="77" font-size="32" font-weight="900" fill="#ffffff">ענה מהר · אסוף בונוסים · קפוץ במיקום</text>
    </g>

    <g transform="translate(178 1456)" filter="url(#shadow)">
      <rect width="724" height="122" rx="61" fill="#051255" opacity="0.42" transform="translate(0 22)"/>
      <rect width="724" height="122" rx="61" fill="url(#button)" stroke="rgba(255,255,255,0.42)" stroke-width="3"/>
      <rect x="26" y="18" width="672" height="38" rx="19" fill="rgba(255,255,255,0.22)"/>
      <text x="362" y="78" font-size="43" font-weight="1000" fill="#ffffff">התחל</text>
    </g>

    <g transform="translate(242 1660)">
      <rect width="596" height="26" rx="13" fill="rgba(255,255,255,0.18)"/>
      <rect width="60" height="26" rx="13" fill="url(#aqua)"/>
      <text x="298" y="78" font-size="27" font-weight="900" fill="#dffbff">שלב 1 מחכה לך</text>
    </g>
  </g>
</svg>
