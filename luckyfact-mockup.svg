  <text x="140" y="1104" fill="#ffffff" font-size="38" font-family="Arial, sans-serif" font-weight="700">שלב 4 מתוך 10</text>
  <text x="940" y="1104" text-anchor="end" fill="#ffffff" font-size="38" font-family="Arial, sans-serif" font-weight="700">15/15</text>
