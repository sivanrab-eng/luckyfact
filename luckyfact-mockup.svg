  <rect x="180" y="1860" width="720" height="56" rx="24" fill="rgba(0,0,0,0.28)"/>
  <text x="540" y="1895" text-anchor="middle" fill="#ffffff" font-size="29" font-family="Arial, sans-serif" font-weight="700">שיתוף ל-WhatsApp: מי מגיע רחוק יותר?</text>
