  <rect x="746" y="146" width="194" height="74" rx="34" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.18)"/>
  <text x="843" y="194" text-anchor="middle" fill="#ffffff" font-size="30" font-family="Arial, sans-serif" font-weight="700">גבוהה מאוד</text>

  <!-- title ring -->
