      <circle cx="36" cy="26" r="16" fill="#d7ffff" opacity="0.35"/>
      <circle cx="76" cy="26" r="16" fill="#d7ffff" opacity="0.35"/>
      <circle cx="116" cy="26" r="16" fill="#d7ffff" opacity="0.35"/>
