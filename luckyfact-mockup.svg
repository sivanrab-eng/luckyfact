  <ellipse cx="542" cy="710" rx="290" ry="290" fill="none" stroke="#54ffff" stroke-width="10" opacity="0.55" filter="url(#soft)"/>

  <text x="542" y="650" text-anchor="middle" fill="#ffffff" font-size="86" font-family="Arial, sans-serif" font-weight="900">Color Block</text>
  <text x="542" y="800" text-anchor="middle" fill="#ffffff" font-size="96" font-family="Arial, sans-serif" font-weight="900">Jam</text>
  <text x="542" y="862" text-anchor="middle" fill="#edf7ff" font-size="34" font-family="Arial, sans-serif">10 שלבים · 15 שאלות בכל שלב</text>

