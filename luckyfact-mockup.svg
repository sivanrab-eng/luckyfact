  <!-- question card -->
  <rect x="94" y="1246" width="892" height="302" rx="40" fill="#ffffff" opacity="0.96" filter="url(#shadow)"/>
  <rect x="94" y="1246" width="892" height="302" rx="40" fill="url(#card)" stroke="rgba(255,255,255,0.24)" stroke-width="4"/>
  <text x="540" y="1322" text-anchor="middle" fill="#1a2744" font-size="48" font-family="Arial, sans-serif" font-weight="700">האם כדור הארץ מסתובב סביב עצמו פעם ביום?</text>
  <text x="540" y="1386" text-anchor="middle" fill="#5c6c92" font-size="30" font-family="Arial, sans-serif">בחר אמת או שקר כדי להמשיך</text>

  <rect x="140" y="1454" width="350" height="64" rx="28" fill="url(#btnBlue)" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
  <text x="315" y="1496" text-anchor="middle" fill="#ffffff" font-size="34" font-family="Arial, sans-serif" font-weight="700">זה נכון</text>
  <rect x="590" y="1454" width="350" height="64" rx="28" fill="url(#btnPink)" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
  <text x="765" y="1496" text-anchor="middle" fill="#ffffff" font-size="34" font-family="Arial, sans-serif" font-weight="700">זה לא נכון</text>

  <!-- leaderboard card -->
  <rect x="94" y="1590" width="892" height="255" rx="40" fill="#172560" opacity="0.96" filter="url(#shadow)"/>
  <rect x="94" y="1590" width="892" height="255" rx="40" fill="#19297b" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
  <text x="140" y="1640" fill="#ffffff" font-size="38" font-family="Arial, sans-serif" font-weight="700">בילבורד חי</text>
  <text x="942" y="1640" text-anchor="end" fill="#ffe25c" font-size="38" font-family="Arial, sans-serif" font-weight="700">#4</text>

  <g font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">
    <circle cx="152" cy="1698" r="14" fill="#ff5a79"/>
