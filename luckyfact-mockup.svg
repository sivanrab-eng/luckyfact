      <circle cx="38" cy="30" r="17" fill="#ffd9a9" opacity="0.35"/>
      <circle cx="86" cy="30" r="17" fill="#ffd9a9" opacity="0.35"/>
      <circle cx="134" cy="30" r="17" fill="#ffd9a9" opacity="0.35"/>
      <circle cx="38" cy="78" r="17" fill="#ffd9a9" opacity="0.35"/>
