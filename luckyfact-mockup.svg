<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f69ff"/>
      <stop offset="58%" stop-color="#4a6bff"/>
      <stop offset="100%" stop-color="#d97cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="60%" stop-color="#7efcff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7efcff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a33c8"/>
      <stop offset="100%" stop-color="#1d247f"/>
    </linearGradient>
    <linearGradient id="btnBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a8dff"/>
      <stop offset="100%" stop-color="#1560ff"/>
    </linearGradient>
    <linearGradient id="btnPink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff78a3"/>
      <stop offset="100%" stop-color="#ff3668"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eefc"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

