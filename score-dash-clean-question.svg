<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Score Dash question screen">
  <defs>
    <linearGradient id="bg" x1="120" y1="0" x2="960" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#061a68"/>
      <stop offset="46%" stop-color="#2149d7"/>
      <stop offset="78%" stop-color="#7d34df"/>
      <stop offset="100%" stop-color="#12cfe8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="54%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="32%" stop-color="#64f5ff" stop-opacity="0.28"/>
      <stop offset="72%" stop-color="#784cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#081451" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#10236f" stop-opacity="0.58"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcecff"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#63f7ff"/>
      <stop offset="100%" stop-color="#22ffa8"/>
    </linearGradient>
    <linearGradient id="blueBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ef5ff"/>
      <stop offset="46%" stop-color="#247cff"/>
      <stop offset="100%" stop-color="#173fce"/>
    </linearGradient>
    <linearGradient id="violetBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b98aff"/>
      <stop offset="46%" stop-color="#7d4cff"/>
      <stop offset="100%" stop-color="#4726c9"/>
    </linearGradient>
    <filter id="blur20" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#02104c" flood-opacity="0.46"/>
    </filter>
    <filter id="textGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#72f8ff" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>
  <path d="M-90 330 C180 210 374 268 584 112 C804 -50 1042 54 1190 -78" fill="none" stroke="#66f7ff" stroke-width="24" stroke-linecap="round" opacity="0.16" filter="url(#blur20)"/>
  <path d="M-116 1570 C146 1428 382 1488 582 1340 C792 1185 988 1280 1190 1130" fill="none" stroke="#c78cff" stroke-width="22" stroke-linecap="round" opacity="0.15" filter="url(#blur20)"/>

  <g font-family="'Rubik', 'Fredoka', Arial, sans-serif">
    <g transform="translate(92 98)" filter="url(#shadow)">
      <rect width="896" height="126" rx="63" fill="rgba(7,18,77,0.58)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <text x="72" y="78" font-size="32" font-weight="900" fill="#ffffff">שלב 6/10</text>
      <text x="824" y="78" font-size="32" font-weight="900" fill="#dffbff" text-anchor="end">שאלה 9/15</text>
      <g transform="translate(62 94)">
        <rect width="772" height="14" rx="7" fill="rgba(255,255,255,0.18)"/>
        <rect width="463" height="14" rx="7" fill="url(#aqua)"/>
      </g>
    </g>

    <g transform="translate(540 480)" text-anchor="middle">
      <ellipse cx="0" cy="126" rx="252" ry="42" fill="#03124d" opacity="0.2" filter="url(#blur20)"/>
      <circle r="186" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.24)" stroke-width="2"/>
      <circle r="158" fill="none" stroke="#7ff8ff" stroke-width="11" opacity="0.34" filter="url(#blur20)"/>
      <circle r="118" fill="url(#glass)" stroke="rgba(255,255,255,0.34)" stroke-width="3"/>
      <text y="-18" font-size="34" font-weight="900" fill="#dffbff" filter="url(#textGlow)">Score Dash</text>
      <text y="48" font-size="64" font-weight="1000" fill="#ffffff" filter="url(#textGlow)">שאלה 9</text>
    </g>

    <g transform="translate(84 748)" filter="url(#shadow)">
      <rect width="912" height="430" rx="56" fill="url(#panel)"/>
      <rect x="26" y="26" width="860" height="378" rx="44" fill="rgba(45,116,255,0.07)" stroke="rgba(27,80,220,0.16)" stroke-width="2"/>
      <text x="456" y="124" font-size="32" font-weight="900" fill="#3153a8" text-anchor="middle">אמת או שקר</text>
      <text x="456" y="214" font-size="55" font-weight="1000" fill="#101f58" text-anchor="middle">האם פינגווין יכול לעוף?</text>
      <text x="456" y="282" font-size="30" font-weight="800" fill="#52679b" text-anchor="middle">בחר תשובה כדי להמשיך בדאש</text>
    </g>

    <g transform="translate(118 1260)">
      <rect width="390" height="142" rx="58" fill="url(#blueBtn)" stroke="rgba(255,255,255,0.42)" stroke-width="3" filter="url(#shadow)"/>
      <rect x="22" y="18" width="346" height="42" rx="21" fill="rgba(255,255,255,0.22)"/>
      <text x="195" y="91" font-size="43" font-weight="1000" fill="#ffffff" text-anchor="middle">אמת</text>

      <g transform="translate(454 0)">
        <rect width="390" height="142" rx="58" fill="url(#violetBtn)" stroke="rgba(255,255,255,0.38)" stroke-width="3" filter="url(#shadow)"/>
        <rect x="22" y="18" width="346" height="42" rx="21" fill="rgba(255,255,255,0.2)"/>
        <text x="195" y="91" font-size="43" font-weight="1000" fill="#ffffff" text-anchor="middle">שקר</text>
      </g>
    </g>

    <g transform="translate(144 1500)" filter="url(#shadow)">
      <rect width="792" height="128" rx="64" fill="rgba(8,18,76,0.58)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <text x="396" y="78" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle">רצף 3 · +25</text>
    </g>

    <g transform="translate(208 1690)" opacity="0.95">
      <rect width="664" height="26" rx="13" fill="rgba(255,255,255,0.18)"/>
      <rect width="399" height="26" rx="13" fill="url(#aqua)"/>
      <text x="332" y="78" font-size="27" font-weight="900" fill="#dffbff" text-anchor="middle">נותרו 6 שאלות לשלב הבא</text>
    </g>
  </g>
