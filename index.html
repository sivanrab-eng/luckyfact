<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Score Dash</title>
  <style>
    :root {
      --bg-1: #061a68;
      --bg-2: #2248d8;
      --bg-3: #12cfe8;
      --panel: rgba(13, 20, 70, 0.62);
      --panel-strong: rgba(20, 24, 110, 0.78);
      --panel-border: rgba(255, 255, 255, 0.2);
      --text: #f7fbff;
      --muted: rgba(240, 247, 255, 0.8);
      --accent: #53f1ff;
      --danger: #9c7aff;
      --success: #63f49d;
      --gold: #ffe16a;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      --shadow-deep: 0 18px 0 rgba(0, 0, 0, 0.18), 0 30px 60px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Rubik", "Fredoka", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.34), transparent 24%),
        linear-gradient(142deg, var(--bg-1) 0%, var(--bg-2) 48%, #7d34df 78%, var(--bg-3) 100%);
      display: grid;
      place-items: center;
      padding: 18px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 72px 72px, 72px 72px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 92%);
      opacity: 0.38;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto 0 -20vh 0;
      height: 42vh;
      pointer-events: none;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18), transparent 35%),
                  linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0));
      filter: blur(20px);
      opacity: 0.75;
    }

    #game-container {
      width: min(100%, 560px);
      padding: 24px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05)),
        var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-deep);
      backdrop-filter: blur(14px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    #game-container::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 16%, rgba(255,255,255,0.2), transparent 14%),
        radial-gradient(circle at 80% 18%, rgba(83,241,255,0.2), transparent 18%),
        linear-gradient(135deg, rgba(83,241,255,0.18), transparent 34%, rgba(255,111,179,0.16));
      opacity: 0.95;
      mix-blend-mode: screen;
    }

    .stats {
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 1.05rem;
      color: var(--accent);
      position: relative;
      z-index: 1;
    }

    .stats > div {
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      color: #f8fbff;
    }

    .stats.is-transition-hidden {
      display: none;
    }

    .progress-wrap {
      position: relative;
      z-index: 1;
      margin: 8px 0 16px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.88rem;
      flex-wrap: wrap;
    }

    .progress-head strong {
      color: var(--text);
      font-weight: 700;
    }

    .progress-meter {
      height: 14px;
      background: rgba(7, 20, 74, 0.82);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.12);
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #53f1ff 0%, #7bffcb 52%, #ffe16a 100%);
      border-radius: inherit;
      transition: width 0.45s ease;
      box-shadow: 0 0 18px rgba(83, 241, 255, 0.55);
    }

    .is-hidden {
      display: none !important;
    }

    .start-screen {
      position: relative;
      z-index: 1;
      min-height: 420px;
      display: grid;
      place-items: center;
      gap: 14px;
      padding: 24px 10px 18px;
      text-align: center;
    }

    .start-screen.is-hidden {
      display: none;
    }

    .start-kicker {
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.78rem;
      margin: 0;
      opacity: 0.95;
    }

    .start-title {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 4rem);
      line-height: 0.95;
      font-weight: 900;
      text-shadow: 0 10px 0 rgba(0,0,0,0.18), 0 0 30px rgba(83,241,255,0.32);
    }

    .start-copy {
      margin: 0;
      color: rgba(246, 250, 255, 0.9);
      line-height: 1.65;
      font-size: 1rem;
      max-width: 30ch;
    }

    .start-actions {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .btn-start {
      min-width: 180px;
      background: linear-gradient(180deg, #2b9aff, #1560ff);
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: 0 16px 30px rgba(18, 77, 255, 0.34);
    }

    .main-ui {
      display: block;
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .main-ui.is-hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      height: 0;
      overflow: hidden;
    }

    .main-ui.is-transition-mode {
      min-height: 520px;
      display: grid;
      align-content: center;
    }

    .main-ui.is-transition-mode .stage-row,
    .main-ui.is-transition-mode .progress-wrap,
    .main-ui.is-transition-mode .question,
    .main-ui.is-transition-mode .buttons,
    .main-ui.is-transition-mode #feedback,
    .main-ui.is-transition-mode .replay-row,
    .main-ui.is-transition-mode > .share-panel {
      display: none !important;
    }

    .stage-row {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .stage-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 15px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06));
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(248, 251, 255, 0.82);
      font-size: 0.9rem;
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
      min-width: 260px;
    }

    .stage-pill strong {
      color: var(--text);
      font-weight: 700;
    }

    .luck-meter {
      height: 14px;
      background: rgba(7, 20, 74, 0.82);
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 12px;
      position: relative;
      z-index: 1;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.12);
    }

    #luck-bar {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #9c7aff 0%, #53f1ff 52%, #63f49d 100%);
      border-radius: inherit;
      transition: width 0.45s ease;
      box-shadow: 0 0 18px rgba(83, 241, 255, 0.55);
    }

    .question {
      min-height: 112px;
      font-size: clamp(1.2rem, 3vw, 1.45rem);
      line-height: 1.6;
      margin: 0 0 20px;
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 0 rgba(255,255,255,0.2);
      white-space: pre-line;
    }

    #question-box.question-swap {
      animation: questionSwap 720ms ease;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 18px;
      min-width: 138px;
      padding: 14px 24px;
      font-size: 1.05rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, filter 0.18s ease;
      box-shadow: 0 16px 0 rgba(0,0,0,0.18), 0 18px 26px rgba(0, 0, 0, 0.22);
      filter: saturate(1.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      filter: brightness(1.05) saturate(1.08);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .btn-truth {
      background: linear-gradient(180deg, #31a4ff, #145eff);
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .btn-lie {
      background: linear-gradient(180deg, #b98aff, #4726c9);
      border: 1px solid rgba(255, 255, 255, 0.24);
    }

    #feedback {
      margin-top: 18px;
      min-height: 54px;
      font-size: 1.05rem;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }

    #feedback.success {
      color: #8afcba;
    }

    #feedback.error {
      color: #ff8eb0;
    }

    #feedback.neutral {
      color: rgba(240, 247, 255, 0.78);
    }

    #feedback.hot {
      color: #ffe16a;
      text-shadow: 0 0 18px rgba(255, 225, 106, 0.34);
    }

    .end-state {
      color: var(--gold);
      font-size: 1.15rem;
    }

    .replay-row {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .btn-replay {
      background: linear-gradient(180deg, #2a8dff, #163bfe);
      border: 1px solid rgba(255, 255, 255, 0.24);
      min-width: 168px;
    }

    .share-panel {
      margin-top: 18px;
      padding: 16px 14px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
      position: relative;
      z-index: 1;
      display: none;
      gap: 10px;
      box-shadow: 0 16px 0 rgba(0,0,0,0.14);
    }

    .share-panel.is-visible {
      display: grid;
    }

    .share-title {
      margin: 0;
      font-size: 1.1rem;
      color: var(--text);
    }

    .share-copy {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .btn-share {
      background: linear-gradient(180deg, #2a8dff, #1560ff);
      border: 1px solid rgba(255, 255, 255, 0.28);
      min-width: 180px;
    }

    .transition-panel {
      margin-top: 18px;
      padding: 18px 16px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        radial-gradient(circle at top left, rgba(83,241,255,0.26), transparent 36%),
        radial-gradient(circle at bottom right, rgba(156, 122, 255, 0.24), transparent 35%),
        rgba(12, 18, 82, 0.74);
      position: relative;
      z-index: 1;
      display: none;
      gap: 10px;
      overflow: hidden;
      box-shadow: 0 16px 0 rgba(0,0,0,0.14);
    }

    .transition-panel.is-visible {
      display: grid;
    }

    .main-ui.is-transition-mode .transition-panel {
      margin-top: 0;
    }

    .transition-actions {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .transition-title {
      margin: 0;
      font-size: 1.12rem;
      color: var(--text);
      font-weight: 800;
    }

    .transition-copy {
      margin: 0;
      color: rgba(240,247,255,0.8);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .transition-orbit {
      position: absolute;
      inset: -28% -8% auto auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: inset 0 0 24px rgba(83,241,255,0.12);
      opacity: 0.85;
      pointer-events: none;
    }

    .transition-orbit::before {
      content: "";
      position: absolute;
      inset: 26px;
      border-radius: 50%;
      border: 1px dashed rgba(83,241,255,0.34);
      animation: slowSpin 9s linear infinite;
    }

    .transition-kicker {
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
    }

    #game-container.stage-flash {
      animation: stageFlash 760ms ease;
    }

    .stage-pill.stage-bump {
      animation: stageBump 760ms ease;
    }

    @keyframes questionSwap {
      0% { transform: translateY(8px); opacity: 0.2; }
      35% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes stageFlash {
      0% { box-shadow: var(--shadow); }
      35% { box-shadow: 0 0 0 1px rgba(77, 184, 255, 0.18), 0 0 42px rgba(77, 184, 255, 0.12), var(--shadow); }
      100% { box-shadow: var(--shadow); }
    }

    @keyframes stageBump {
      0% { transform: scale(1); }
      40% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes slowSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 520px) {
      #game-container {
        padding: 18px 16px;
        border-radius: 20px;
      }

      .stats {
        justify-content: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .stats > div {
        width: 100%;
      }

      .stage-row {
        margin-bottom: 8px;
      }

      .stage-pill {
        padding: 8px 12px;
        font-size: 0.82rem;
      }

      .start-screen {
        min-height: 380px;
      }

      .start-title {
        font-size: clamp(2.4rem, 13vw, 3.5rem);
      }

      .luck-meter {
        margin: 6px 0 10px;
      }

      .question {
        min-height: 92px;
        margin-bottom: 16px;
      }

      .share-panel,
      .transition-panel {
        border-radius: 18px;
      }

      button {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="stats" class="stats">
      <div>נקודות: <span id="score">500</span></div>
      <div>Combo x<span id="luck-level">0</span></div>
    </div>

    <section id="start-screen" class="start-screen">
      <p class="start-kicker">Fast arcade challenge</p>
      <h1 class="start-title">Score Dash</h1>
      <p class="start-copy">ענה מהר, אסוף בונוסים וקפוץ במיקום.</p>
      <div class="start-actions">
        <button id="start-btn" class="btn-start" type="button">התחל</button>
      </div>
    </section>

    <div id="main-ui" class="main-ui is-hidden">
      <div id="stage-row" class="stage-row">
        <div class="stage-pill"><strong id="stage-question-label">1/10</strong> · שלב <strong id="stage-label">1</strong>/15 · <span id="stage-name">התחלה</span></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-head">
          <span>התקדמות במסלול</span>
          <strong id="progress-text">שלב 1/15</strong>
          <span id="remaining-copy">עוד <strong id="remaining-text">10</strong> לשלב הבא</span>
        </div>
        <div class="progress-meter" aria-hidden="true">
          <div id="progress-bar"></div>
        </div>
      </div>

      <p id="question-box" class="question">מכין את השאלה הראשונה...</p>

      <div class="buttons">
        <button id="truth-btn" class="btn-truth" type="button">אמת</button>
        <button id="lie-btn" class="btn-lie" type="button">שקר</button>
      </div>

      <div id="feedback" class="neutral"></div>
      <div class="replay-row">
        <button id="replay-btn" class="btn-replay" type="button" hidden>שחק שוב</button>
      </div>
      <div id="share-panel" class="share-panel">
        <p class="share-title" id="share-title">סיימת Dash מלא.</p>
        <p class="share-copy" id="share-copy">צברת 0 נקודות והגעת לשער האחרון.</p>
        <div class="start-actions">
          <button id="share-btn" class="btn-share" type="button">שתף ב-WhatsApp</button>
        </div>
      </div>
      <div id="transition-panel" class="transition-panel">
        <div class="transition-orbit" aria-hidden="true"></div>
        <p id="transition-kicker" class="transition-kicker">Stage clear</p>
        <p id="transition-title" class="transition-title">+250</p>
        <p class="transition-copy" id="transition-copy">בונוס שלב · קפיצה במיקום</p>
        <div class="transition-actions">
          <button id="transition-share-btn" class="btn-share" type="button" hidden>שתף ב-WhatsApp</button>
          <button id="next-stage-btn" class="btn-share" type="button">המשך לשלב הבא</button>
        </div>
      </div>
    </div>
  </div>

    function buildDeck() {
      const quickFacts = facts.slice(0, QUESTIONS_PER_STAGE).map((fact) => ({
        ...fact,
        source: "quick"
      }));
      const threeLineFacts = suppliedThreeLineFacts.map((fact) => ({
        ...fact,
        source: "three-line"
      }));

      const deck = [];
      for (let stageIndex = 0; stageIndex < TOTAL_STAGES; stageIndex += 1) {
        let stageFacts;
        if (stageIndex === 0) {
          stageFacts = quickFacts;
        } else if (stageIndex <= 5) {
          const offset = (stageIndex - 1) * QUESTIONS_PER_STAGE;
          stageFacts = suppliedTwoLineFacts.slice(offset, offset + QUESTIONS_PER_STAGE);
        } else if (stageIndex <= 10) {
          const offset = (stageIndex - 6) * QUESTIONS_PER_STAGE;
          stageFacts = threeLineFacts.slice(offset, offset + QUESTIONS_PER_STAGE);
        } else {
          const offset = (stageIndex - 11) * QUESTIONS_PER_STAGE;
          stageFacts = suppliedFourLineFacts.slice(offset, offset + QUESTIONS_PER_STAGE);
        }

        if (stageFacts.length !== QUESTIONS_PER_STAGE) {
          throw new Error("Stage " + (stageIndex + 1) + " needs " + QUESTIONS_PER_STAGE + " questions.");
        }

        stageFacts.forEach((fact) => {
          deck.push({
            text: fact.text,
            isTrue: fact.isTrue,
            stageIndex,
            preserveLines: fact.source !== "quick" && fact.text.includes("\n")
          });
        });
      }

      return deck;
    }

    function shuffleFacts(source) {
      const copy = source.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function playStageTone() {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextCtor) {
        return;
      }

      if (!state.audioContext) {
        state.audioContext = new AudioContextCtor();
      }

      const ctx = state.audioContext;
      if (ctx.state === "suspended") {
        ctx.resume().catch(() => {});
      }

      const now = ctx.currentTime;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.045, now + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);
      gain.connect(ctx.destination);

      const oscillatorA = ctx.createOscillator();
      oscillatorA.type = "sine";
      oscillatorA.frequency.setValueAtTime(392, now);
      oscillatorA.frequency.exponentialRampToValueAtTime(523.25, now + 0.2);
      oscillatorA.connect(gain);

      const oscillatorB = ctx.createOscillator();
      oscillatorB.type = "triangle";
      oscillatorB.frequency.setValueAtTime(587.33, now);
      oscillatorB.frequency.exponentialRampToValueAtTime(659.25, now + 0.2);
      oscillatorB.connect(gain);

      oscillatorA.start(now);
      oscillatorB.start(now);
      oscillatorA.stop(now + 0.48);
      oscillatorB.stop(now + 0.48);
    }

    function getQuestionLineCount(stageIndex) {
      if (stageIndex === 0) {
        return 1;
      }

      if (stageIndex >= 1 && stageIndex <= 5) {

      }

      if (stageIndex >= 6 && stageIndex <= 10) {

      }

      return 4;
    }

    function normalizeQuestionText(text) {
      return text.replace(/\s+/g, " ").trim();
    }

    function wrapTextToLines(text, lineCount) {
      if (lineCount <= 1) {
        return text.replace(/\s+/g, " ").trim();
      }

      const words = text.replace(/\s+/g, " ").trim().split(" ");
      const totalChars = words.reduce((sum, word) => sum + word.length, 0) + Math.max(words.length - 1, 0);
      const targetLineLength = Math.ceil(totalChars / lineCount);
      const lines = [];
      let current = "";

      words.forEach((word) => {
        const next = current ? `${current} ${word}` : word;
        if (lines.length < lineCount - 1 && current && next.length > targetLineLength) {
          lines.push(current);
          current = word;
        } else {
          current = next;
        }
      });

      if (current) {
        lines.push(current);
      }

      return lines.join("\n");
    }

    function formatQuestion(card) {
      if (card.preserveLines) {
        return card.text;
      }

      return wrapTextToLines(card.text, getQuestionLineCount(card.stageIndex));
    }

      if (state.index >= state.deck.length) {
        finishGame();
        return;
      }

      state.locked = false;
      setTransitionMode(false);
      setTransitionVisible(false);
      setReplayVisible(false);
      setShareVisible(false);
      setNextStageVisible(false);
      setTransitionShareVisible(false);
      updateStats();
      elements.questionBox.textContent = formatQuestion(state.deck[state.index]);
      showFeedback("", "neutral");
      setButtonsEnabled(true);
    }

    function showStageTransition(completedStageIndex) {
      const nextStageName = stageNames[completedStageIndex + 1] || stageNames[stageNames.length - 1];
      const reward = getStageReward();
      state.score += reward.points;
      updateStats();
      setButtonsEnabled(false);
      state.locked = true;
      state.awaitingStageContinue = true;
      setTransitionMode(true);
      setTransitionVisible(true);
      setNextStageVisible(true);
      setTransitionShareVisible(true);
      elements.transitionKicker.textContent = reward.label;
      elements.transitionTitle.textContent = reward.title;
      elements.transitionCopy.textContent = `${reward.copy} · הבא: ${nextStageName}`;
      setShareMessage(
        `שלב ${completedStageIndex + 1} נפתח`,
        `עברתי את שלב ${completedStageIndex + 1} ב-Score Dash עם ${formatScore(state.score)} נקודות. תצליחו לעקוף אותי?`
      );
      elements.questionBox.textContent = `שלב ${completedStageIndex + 1} הושלם`;
      showFeedback(reward.copy, "hot");
      setShareVisible(false);

      restartAnimation(elements.gameContainer, "stage-flash");
      restartAnimation(elements.stageRow.firstElementChild, "stage-bump");
      restartAnimation(elements.questionBox, "question-swap");
      playStageTone();

      clearTimeout(state.timerId);
    }

    function showFeedback(message, kind) {
      elements.feedback.textContent = message;
      elements.feedback.className = kind;
    }

    function finishGame() {
      let finalReward = null;
      if (!state.finalRewardClaimed) {
        finalReward = getStageReward();
        state.score += finalReward.points;
        state.finalRewardClaimed = true;
        updateStats();
      }

      setTransitionVisible(true);
      setNextStageVisible(false);
      setTransitionShareVisible(false);
      elements.questionBox.textContent = `כל השלבים הושלמו. צברת ${formatScore(state.score)} נקודות.`;
      showFeedback("Dash מלא. אפשר להתחיל סיבוב חדש.", "end-state");
      elements.transitionKicker.textContent = finalReward ? finalReward.label : "Stage clear";
      elements.transitionTitle.textContent = finalReward ? finalReward.title : "כל 15 השלבים הושלמו";
      elements.transitionCopy.textContent = `כל 15 השלבים הושלמו · ${formatScore(state.score)} נקודות`;
      setShareMessage(
        "סיימת Dash מלא.",
        `סיימתי את Score Dash עם ${formatScore(state.score)} נקודות. מי רוצה לנסות לעקוף אותי?`
      );
      setButtonsEnabled(false);
      setReplayVisible(true);
      setShareVisible(true);
      state.locked = true;
      state.awaitingStageContinue = false;
      elements.replayBtn.textContent = "שחק שוב מהתחלה";
    }

    function resetGame() {
      clearTimeout(state.timerId);
      state.score = 500;
      state.index = 0;
      state.stage = 0;
      state.streak = 0;
      state.stageMistakes = 0;
      state.finalRewardClaimed = false;
      state.locked = false;
      state.awaitingStageContinue = false;
      setTransitionMode(false);
      state.deck = buildDeck();
      setTransitionVisible(false);

      elements.stageLabel.textContent = "1";
      showFeedback("", "neutral");
      updateStats();
      setButtonsEnabled(true);
      setReplayVisible(false);
      setShareVisible(false);
      showMainUI(true);
      renderQuestion();
    }

    function checkAnswer(userChoice) {
      if (state.locked || state.index >= state.deck.length) {
        return;
      }

      state.locked = true;
      setButtonsEnabled(false);

      const correct = state.deck[state.index].isTrue;
      const isCorrect = userChoice === correct;

      if (isCorrect) {
        state.score += 100;
        state.streak += 1;
        const boost = state.streak >= 3 ? 25 : 0;
        if (boost > 0) {
          state.score += boost;
        }
        if (state.streak >= 3) {
          showFeedback(`${getEncouragement("streak")} +${100 + boost}`, "hot");
        } else {
          showFeedback(`${getEncouragement("correct")} +100`, "success");
        }
      } else {
        state.score -= 50;
        state.streak = 0;
        state.stageMistakes += 1;
        showFeedback(getEncouragement("gentle"), "error");
      }
      updateStats();
      state.index += 1;
      if (state.index >= state.deck.length) {
        state.timerId = setTimeout(finishGame, 900);
        return;
      }

      if (state.index % QUESTIONS_PER_STAGE === 0) {
        const completedStageIndex = Math.max(Math.floor((state.index - 1) / QUESTIONS_PER_STAGE), 0);
        state.timerId = setTimeout(() => showStageTransition(completedStageIndex), 700);
        return;
      }

      state.timerId = setTimeout(renderQuestion, 950);
    }

    elements.truthBtn.addEventListener("click", () => checkAnswer(true));
    elements.lieBtn.addEventListener("click", () => checkAnswer(false));
    elements.replayBtn.addEventListener("click", resetGame);
    elements.shareBtn.addEventListener("click", async () => {
      const text = getShareText();
      openWhatsAppShare(text);
      showFeedback("פותח WhatsApp לשיתוף.", "success");
    });
    elements.transitionShareBtn.addEventListener("click", async () => {
      openWhatsAppShare(getShareText());
    });
    elements.nextStageBtn.addEventListener("click", () => {
      if (!state.awaitingStageContinue) {
        return;
      }

      state.awaitingStageContinue = false;
      state.locked = false;
      state.stageMistakes = 0;
      setNextStageVisible(false);
      renderQuestion();
    });
    elements.startBtn.addEventListener("click", () => {
      state.started = true;
      resetGame();
    });

    updateStats();
    showMainUI(false);
    setReplayVisible(false);
  </script>
</body>
</html>
