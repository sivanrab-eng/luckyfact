    <circle cx="172" cy="1418" r="14" fill="#ff5a79"/><text x="210" y="1426">נועה</text><text x="900" y="1426" text-anchor="end">19,120</text>
    <circle cx="172" cy="1456" r="14" fill="#4ec1ff"/><text x="210" y="1464">דני</text><text x="900" y="1464" text-anchor="end">18,860</text>
    <circle cx="172" cy="1494" r="14" fill="#62f480"/><text x="210" y="1502">את/ה</text><text x="900" y="1502" text-anchor="end">18,430</text>
    <circle cx="172" cy="1532" r="14" fill="#ffbd3f"/><text x="210" y="1540">מיה</text><text x="900" y="1540" text-anchor="end">18,210</text>
