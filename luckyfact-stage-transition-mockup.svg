<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d67ff"/>
      <stop offset="55%" stop-color="#3e67ff"/>
      <stop offset="100%" stop-color="#d874ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7efcff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7efcff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5"/></filter>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2b35c8"/><stop offset="100%" stop-color="#171f79"/></linearGradient>
    <linearGradient id="btnBlue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2e91ff"/><stop offset="100%" stop-color="#1560ff"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff299"/><stop offset="100%" stop-color="#ffcc2f"/></linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
