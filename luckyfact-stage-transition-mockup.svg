    <g transform="translate(380 120)"><rect width="310" height="122" rx="34" fill="#b24dff"/><circle cx="50" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="102" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="154" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="206" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="258" cy="30" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="50" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="102" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="154" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="206" cy="78" r="18" fill="#edd2ff" opacity="0.3"/><circle cx="258" cy="78" r="18" fill="#edd2ff" opacity="0.3"/></g>
