      <stop offset="100%" stop-color="#d66cff"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="22%" r="46%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="70%" stop-color="#7cf4ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7cf4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="50%" cy="78%" r="44%">
      <stop offset="0%" stop-color="#ffd3ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffd3ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
