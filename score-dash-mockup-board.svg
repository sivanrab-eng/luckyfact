<svg width="1920" height="1280" viewBox="0 0 1920 1280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Score Dash three screen mockup board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061a68"/>
      <stop offset="45%" stop-color="#2248d8"/>
      <stop offset="78%" stop-color="#7d34df"/>
      <stop offset="100%" stop-color="#12cfe8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.58"/>
      <stop offset="34%" stop-color="#64f5ff" stop-opacity="0.22"/>
      <stop offset="76%" stop-color="#784cff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#081451" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#132275" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcecff"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60f7ff"/>
      <stop offset="100%" stop-color="#20ffa7"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ff7ff"/>
      <stop offset="42%" stop-color="#2878ff"/>
      <stop offset="100%" stop-color="#173fce"/>
    </linearGradient>
    <linearGradient id="violetButton" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b98aff"/>
      <stop offset="46%" stop-color="#7d4cff"/>
      <stop offset="100%" stop-color="#4726c9"/>
    </linearGradient>
    <filter id="blur14" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#02104c" flood-opacity="0.44"/>
    </filter>
    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#72f8ff" flood-opacity="0.66"/>
    </filter>
  </defs>

  <rect width="1920" height="1280" fill="url(#bg)"/>
  <rect width="1920" height="1280" fill="url(#glow)"/>
  <path d="M-130 260 C220 88 540 186 830 16 C1150 -170 1580 22 2050 -148" fill="none" stroke="#66f7ff" stroke-width="30" stroke-linecap="round" opacity="0.14" filter="url(#blur14)"/>
  <path d="M-170 1168 C250 986 512 1082 820 916 C1168 728 1514 868 2040 668" fill="none" stroke="#c78cff" stroke-width="28" stroke-linecap="round" opacity="0.14" filter="url(#blur14)"/>

  <g font-family="'Rubik', 'Fredoka', Arial, sans-serif" font-weight="800" fill="#ffffff" text-anchor="middle">
    <text x="360" y="54" font-size="30">פתיחה</text>
    <text x="960" y="54" font-size="30">שאלה</text>
    <text x="1560" y="54" font-size="30">מעבר שלב</text>

    <g transform="translate(120 90)">
      <rect width="500" height="1100" rx="58" fill="rgba(7,18,77,0.44)" stroke="rgba(255,255,255,0.18)" stroke-width="2" filter="url(#shadow)"/>
      <rect x="26" y="24" width="448" height="1052" rx="48" fill="rgba(255,255,255,0.07)"/>

      <g transform="translate(250 470)">
        <ellipse cx="0" cy="210" rx="188" ry="32" fill="#03124d" opacity="0.24" filter="url(#blur14)"/>
        <circle r="190" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
        <circle r="166" fill="none" stroke="#7ff8ff" stroke-width="9" opacity="0.36" filter="url(#blur14)"/>
        <circle r="134" fill="url(#glass)" stroke="rgba(255,255,255,0.34)" stroke-width="2"/>
        <circle r="104" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="4" stroke-dasharray="18 13"/>
        <text y="-36" font-size="54" font-weight="1000" filter="url(#textGlow)">Score Dash</text>
        <text y="22" font-size="23">אתגר מהיר עד השלב הבא</text>
        <text y="66" font-size="18" fill="#dffbff">10 שלבים · 15 שאלות בכל שלב</text>
      </g>

      <rect x="80" y="740" width="340" height="72" rx="36" fill="rgba(7,18,77,0.58)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <text x="250" y="785" font-size="19">ענה מהר · אסוף בונוסים · קפוץ במיקום</text>
      <rect x="96" y="858" width="308" height="76" rx="38" fill="url(#button)" stroke="rgba(255,255,255,0.42)" stroke-width="2"/>
      <text x="250" y="906" font-size="28">התחל</text>
      <text x="250" y="1040" font-size="19" fill="#cfe1ff">מסך פתיחה</text>
    </g>

    <g transform="translate(710 90)">
      <rect width="500" height="1100" rx="58" fill="rgba(7,18,77,0.44)" stroke="rgba(255,255,255,0.18)" stroke-width="2" filter="url(#shadow)"/>
      <rect x="26" y="24" width="448" height="1052" rx="48" fill="rgba(255,255,255,0.07)"/>

      <rect x="48" y="56" width="404" height="88" rx="44" fill="rgba(7,18,77,0.58)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <text x="92" y="109" font-size="22" text-anchor="start">שלב 6/10</text>
      <text x="408" y="109" font-size="22" text-anchor="end">שאלה 9/15</text>
      <rect x="76" y="126" width="348" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
      <rect x="76" y="126" width="209" height="10" rx="5" fill="url(#aqua)"/>

      <g transform="translate(250 315)">
        <circle r="102" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
        <circle r="84" fill="none" stroke="#7ff8ff" stroke-width="7" opacity="0.36" filter="url(#blur14)"/>
        <circle r="62" fill="url(#glass)" stroke="rgba(255,255,255,0.34)" stroke-width="2"/>
        <text y="-10" font-size="20" fill="#dffbff">Score Dash</text>
        <text y="34" font-size="36" font-weight="1000">שאלה 9</text>
      </g>

      <rect x="50" y="500" width="400" height="244" rx="34" fill="url(#panel)"/>
      <text x="250" y="578" font-size="22" fill="#3153a8">אמת או שקר</text>
      <text x="250" y="642" font-size="32" fill="#101f58">האם פינגווין יכול לעוף?</text>
      <text x="250" y="690" font-size="18" fill="#52679b">בחר תשובה כדי להמשיך בדאש</text>

      <rect x="62" y="790" width="178" height="76" rx="36" fill="url(#button)" stroke="rgba(255,255,255,0.38)" stroke-width="2"/>
      <text x="151" y="838" font-size="28">אמת</text>
      <rect x="260" y="790" width="178" height="76" rx="36" fill="url(#violetButton)" stroke="rgba(255,255,255,0.34)" stroke-width="2"/>
      <text x="349" y="838" font-size="28">שקר</text>
      <rect x="70" y="922" width="360" height="72" rx="36" fill="rgba(7,18,77,0.52)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <text x="250" y="967" font-size="23">רצף 3 · +25</text>
      <text x="250" y="1040" font-size="19" fill="#cfe1ff">מסך שאלה</text>
    </g>

    <g transform="translate(1300 90)">
      <rect width="500" height="1100" rx="58" fill="rgba(7,18,77,0.44)" stroke="rgba(255,255,255,0.18)" stroke-width="2" filter="url(#shadow)"/>
      <rect x="26" y="24" width="448" height="1052" rx="48" fill="rgba(255,255,255,0.07)"/>

      <rect x="48" y="56" width="404" height="88" rx="44" fill="rgba(7,18,77,0.58)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <text x="92" y="109" font-size="22" text-anchor="start">שלב 4/10</text>
      <text x="408" y="109" font-size="22" text-anchor="end">15/15 שאלות</text>
      <rect x="76" y="126" width="348" height="10" rx="5" fill="rgba(255,255,255,0.18)"/>
      <rect x="76" y="126" width="139" height="10" rx="5" fill="url(#aqua)"/>

      <g transform="translate(250 360)">
        <ellipse cx="0" cy="204" rx="178" ry="28" fill="#03124d" opacity="0.24" filter="url(#blur14)"/>
        <circle r="176" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
        <circle r="154" fill="none" stroke="#7ff8ff" stroke-width="8" opacity="0.36" filter="url(#blur14)"/>
        <circle r="126" fill="url(#glass)" stroke="rgba(255,255,255,0.34)" stroke-width="2"/>
        <circle r="94" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="4" stroke-dasharray="18 13"/>
        <text y="-58" font-size="22" fill="#dffbff">Stage clear</text>
        <text y="16" font-size="70" font-weight="1000" filter="url(#textGlow)">+250</text>
        <text y="62" font-size="31" fill="#72ffda">בונוס שלב</text>
      </g>

      <rect x="66" y="638" width="368" height="112" rx="48" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <text x="250" y="706" font-size="25">קפיצה במיקום</text>

      <rect x="60" y="802" width="380" height="118" rx="44" fill="url(#panel)"/>
      <text x="250" y="850" font-size="19" fill="#3153a8">התקדמות השלב</text>
      <text x="250" y="892" font-size="26" fill="#101f58">10 שלבים · 15 שאלות</text>

      <rect x="78" y="958" width="344" height="72" rx="36" fill="url(#button)" stroke="rgba(255,255,255,0.42)" stroke-width="2"/>
      <text x="250" y="1003" font-size="24">המשך לשלב הבא</text>
      <text x="250" y="1040" font-size="19" fill="#cfe1ff">מסך מעבר שלב</text>
    </g>
  </g>
</svg>
