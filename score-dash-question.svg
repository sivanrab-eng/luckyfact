      <stop offset="0%" stop-color="#0b63ff"/>
      <stop offset="52%" stop-color="#4568ff"/>
      <stop offset="100%" stop-color="#d96dff"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="24%" r="54%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.54"/>
      <stop offset="65%" stop-color="#7cf4ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7cf4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
