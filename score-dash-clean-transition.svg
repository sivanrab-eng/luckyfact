<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Score Dash stage clear transition screen">
  <defs>
    <linearGradient id="bg" x1="120" y1="0" x2="960" y2="1920" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#061a68"/>
      <stop offset="45%" stop-color="#2248d8"/>
      <stop offset="78%" stop-color="#7d34df"/>
      <stop offset="100%" stop-color="#12cfe8"/>
    </linearGradient>

    <radialGradient id="stageGlow" cx="50%" cy="36%" r="52%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#58f5ff" stop-opacity="0.34"/>
      <stop offset="72%" stop-color="#784cff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#081451" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="48%" stop-color="#72ecff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#132275" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="capsule" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#d8ecff" stop-opacity="0.94"/>
    </linearGradient>

    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60f7ff"/>
      <stop offset="100%" stop-color="#20ffa7"/>
    </linearGradient>

    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9c7aff"/>
      <stop offset="100%" stop-color="#33e6ff"/>
    </linearGradient>

    <linearGradient id="button" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ff7ff"/>
      <stop offset="42%" stop-color="#2878ff"/>
      <stop offset="100%" stop-color="#173fce"/>
    </linearGradient>

    <filter id="blur20" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#02104c" flood-opacity="0.46"/>
    </filter>

    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#72f8ff" flood-opacity="0.78"/>
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#091559" flood-opacity="0.36"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#stageGlow)"/>

  <path d="M-90 350 C180 210 385 270 582 120 C780 -30 1068 50 1180 -80" fill="none" stroke="#66f7ff" stroke-width="24" stroke-linecap="round" opacity="0.16" filter="url(#blur20)"/>
  <path d="M-120 1610 C145 1455 382 1512 572 1374 C780 1224 984 1308 1188 1164" fill="none" stroke="#c78cff" stroke-width="22" stroke-linecap="round" opacity="0.16" filter="url(#blur20)"/>

  <g font-family="'Rubik', 'Fredoka', Arial, sans-serif">
    <g transform="translate(92 98)" filter="url(#shadow)">
      <rect width="896" height="126" rx="63" fill="rgba(7,18,77,0.58)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
      <rect x="16" y="15" width="864" height="45" rx="22.5" fill="rgba(255,255,255,0.09)"/>
      <text x="72" y="80" font-size="31" font-weight="900" fill="#ffffff">שלב 4/10</text>
      <text x="824" y="80" font-size="31" font-weight="900" fill="#dffbff" text-anchor="end">15/15 שאלות</text>
      <g transform="translate(62 91)">
        <rect width="772" height="14" rx="7" fill="rgba(255,255,255,0.18)"/>
        <rect width="309" height="14" rx="7" fill="url(#aqua)"/>
        <g fill="#ffffff" opacity="0.92">
          <rect x="0" y="-7" width="48" height="28" rx="14"/>
          <rect x="80" y="-7" width="48" height="28" rx="14"/>
          <rect x="160" y="-7" width="48" height="28" rx="14"/>
          <rect x="240" y="-7" width="48" height="28" rx="14"/>
        </g>
        <g fill="#ffffff" opacity="0.28">
          <rect x="320" y="-7" width="48" height="28" rx="14"/>
          <rect x="400" y="-7" width="48" height="28" rx="14"/>
          <rect x="480" y="-7" width="48" height="28" rx="14"/>
          <rect x="560" y="-7" width="48" height="28" rx="14"/>
          <rect x="640" y="-7" width="48" height="28" rx="14"/>
          <rect x="720" y="-7" width="48" height="28" rx="14"/>
        </g>
      </g>
    </g>

    <g transform="translate(540 690)" text-anchor="middle">
      <ellipse cx="0" cy="338" rx="354" ry="52" fill="#03124d" opacity="0.24" filter="url(#blur20)"/>
      <circle r="326" fill="rgba(255,255,255,0.045)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
      <circle r="286" fill="none" stroke="#7ff8ff" stroke-width="14" opacity="0.34" filter="url(#blur20)"/>
      <circle r="254" fill="url(#glass)" stroke="rgba(255,255,255,0.36)" stroke-width="3"/>
      <circle r="205" fill="none" stroke="rgba(255,255,255,0.52)" stroke-width="7" stroke-dasharray="34 22"/>
      <circle r="152" fill="rgba(5,20,85,0.54)" stroke="rgba(117,247,255,0.66)" stroke-width="3"/>

      <text y="-116" font-size="38" font-weight="900" letter-spacing="0" fill="#dffbff" filter="url(#textGlow)">Stage clear</text>
      <text y="18" font-size="124" font-weight="1000" letter-spacing="0" fill="#ffffff" filter="url(#textGlow)">+250</text>
      <text y="92" font-size="50" font-weight="1000" letter-spacing="0" fill="#72ffda">בונוס שלב</text>

      <g transform="translate(-201 148)">
        <rect width="402" height="74" rx="37" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.24)" stroke-width="2"/>
        <text x="201" y="49" font-size="31" font-weight="900" fill="#ffffff">קפיצה במיקום</text>
      </g>
    </g>

    <g transform="translate(104 1080)" filter="url(#shadow)">
      <rect width="872" height="236" rx="54" fill="url(#capsule)"/>
      <rect x="24" y="24" width="824" height="188" rx="44" fill="rgba(45,116,255,0.08)" stroke="rgba(27,80,220,0.16)" stroke-width="2"/>
      <text x="436" y="79" font-size="30" font-weight="900" fill="#3153a8" text-anchor="middle">התקדמות השלב</text>
      <text x="436" y="137" font-size="56" font-weight="1000" fill="#101f58" text-anchor="middle">10 שלבים · 15 שאלות בכל שלב</text>
      <g transform="translate(156 169)">
        <rect width="560" height="22" rx="11" fill="#c5d7ff"/>
        <rect width="560" height="22" rx="11" fill="url(#aqua)"/>
      </g>
    </g>

    <g transform="translate(132 1370)">
      <rect width="816" height="194" rx="56" fill="rgba(8,18,76,0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="2" filter="url(#shadow)"/>
      <rect x="38" y="38" width="338" height="118" rx="59" fill="rgba(255,255,255,0.12)" stroke="rgba(126,246,255,0.28)" stroke-width="2"/>
      <text x="207" y="88" font-size="29" font-weight="900" fill="#dffbff" text-anchor="middle">לפני</text>
      <text x="207" y="133" font-size="43" font-weight="1000" fill="#ffffff" text-anchor="middle">#12</text>

      <path d="M414 97 L486 97" stroke="#74f9ff" stroke-width="14" stroke-linecap="round"/>
      <path d="M470 67 L505 97 L470 127" fill="none" stroke="#74f9ff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="440" y="38" width="338" height="118" rx="59" fill="url(#violet)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
      <text x="609" y="88" font-size="29" font-weight="900" fill="#effcff" text-anchor="middle">עכשיו</text>
      <text x="609" y="133" font-size="43" font-weight="1000" fill="#ffffff" text-anchor="middle">#9</text>
    </g>

    <g transform="translate(178 1646)" filter="url(#shadow)">
      <rect width="724" height="122" rx="61" fill="#051255" opacity="0.42" transform="translate(0 22)"/>
      <rect width="724" height="122" rx="61" fill="url(#button)" stroke="rgba(255,255,255,0.42)" stroke-width="3"/>
      <rect x="26" y="18" width="672" height="38" rx="19" fill="rgba(255,255,255,0.22)"/>
      <text x="362" y="78" font-size="39" font-weight="1000" fill="#ffffff" text-anchor="middle">המשך לשלב הבא</text>
    </g>
  </g>
</svg>
